<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealNest</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .tab-active { background: #1a1a2e; color: #e94560; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(233,69,96,0.15); }
    .card-hover { transition: all 0.2s ease; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</head>
 <body class="h-full">
  <div id="app" class="h-full w-full bg-[#0f0f1a] text-[#e8e8e8] overflow-auto">
   <!-- Login Screen -->
   <div id="login-screen" class="h-full flex items-center justify-center p-4">
    <div class="bg-[#1a1a2e] rounded-2xl p-8 w-full max-w-md shadow-2xl fade-in">
     <div class="text-center mb-8">
      <h1 id="login-title" class="font-display text-3xl text-[#e94560] mb-2">MealNest</h1>
      <p id="login-tagline" class="text-[#8a8a9a]">Smart Mess Management</p>
     </div>
     <div id="login-form" class="space-y-4">
      <div>
       <label for="login-username" class="block text-sm text-[#8a8a9a] mb-1">Username or Email</label>
       <input id="login-username" type="text" placeholder="Enter your username or email" class="w-full bg-[#16162a] border border-[#2a2a4a] rounded-lg px-4 py-3 text-[#e8e8e8] focus:outline-none focus:border-[#e94560]">
      </div>
      <div>
       <label for="login-password" class="block text-sm text-[#8a8a9a] mb-1">Password</label>
       <input id="login-password" type="password" placeholder="Enter your password" class="w-full bg-[#16162a] border border-[#2a2a4a] rounded-lg px-4 py-3 text-[#e8e8e8] focus:outline-none focus:border-[#e94560]">
      </div>
      <button id="login-btn" class="w-full bg-[#e94560] hover:bg-[#d63d56] text-white font-semibold py-3 rounded-lg transition-colors mt-4">Enter MealNest</button>
      <div class="text-center text-sm text-[#8a8a9a]">New here? <button id="show-register-btn" class="text-[#e94560] hover:underline">Create an account</button></div>
     </div>
     <div id="register-form" class="space-y-4 hidden">
      <div>
       <label for="register-username" class="block text-sm text-[#8a8a9a] mb-1">Username</label>
       <input id="register-username" type="text" placeholder="Choose a username" class="w-full bg-[#16162a] border border-[#2a2a4a] rounded-lg px-4 py-3 text-[#e8e8e8] focus:outline-none focus:border-[#e94560]">
      </div>
      <div>
       <label for="register-email" class="block text-sm text-[#8a8a9a] mb-1">Email</label>
       <input id="register-email" type="email" placeholder="Enter your email" class="w-full bg-[#16162a] border border-[#2a2a4a] rounded-lg px-4 py-3 text-[#e8e8e8] focus:outline-none focus:border-[#e94560]">
      </div>
      <div>
       <label for="register-fullname" class="block text-sm text-[#8a8a9a] mb-1">Full Name</label>
       <input id="register-fullname" type="text" placeholder="Enter your full name" class="w-full bg-[#16162a] border border-[#2a2a4a] rounded-lg px-4 py-3 text-[#e8e8e8] focus:outline-none focus:border-[#e94560]">
      </div>
      <div>
       <label for="register-password" class="block text-sm text-[#8a8a9a] mb-1">Password</label>
       <input id="register-password" type="password" placeholder="Create a password" class="w-full bg-[#16162a] border border-[#2a2a4a] rounded-lg px-4 py-3 text-[#e8e8e8] focus:outline-none focus:border-[#e94560]">
      </div>
      <button id="register-btn" class="w-full bg-[#e94560] hover:bg-[#d63d56] text-white font-semibold py-3 rounded-lg transition-colors mt-4">Register</button>
      <div class="text-center text-sm text-[#8a8a9a]">Already have an account? <button id="show-login-btn" class="text-[#e94560] hover:underline">Log in</button></div>
     </div>
    </div>
   </div><!-- Main App -->
   <div id="main-app" class="h-full hidden flex flex-col">
    <!-- Header -->
    <header class="bg-[#1a1a2e] border-b border-[#2a2a4a] px-4 py-3 flex items-center justify-between shrink-0">
     <h1 id="header-title" class="font-display text-xl text-[#e94560]">MealNest</h1>
     <div class="flex items-center gap-3">
      <span id="user-badge" class="text-xs bg-[#2a2a4a] px-3 py-1 rounded-full text-[#8a8a9a]"></span> <button id="logout-btn" class="text-[#8a8a9a] hover:text-[#e94560] transition-colors"><i data-lucide="log-out" style="width:18px;height:18px;"></i></button>
     </div>
    </header><!-- Navigation Tabs -->
    <nav id="nav-tabs" class="bg-[#1a1a2e] px-2 py-2 flex gap-1 overflow-x-auto shrink-0 border-b border-[#2a2a4a]"></nav><!-- Content Area -->
    <main id="content-area" class="flex-1 overflow-auto p-4"></main>
   </div>
  </div>
</body>
</html>
